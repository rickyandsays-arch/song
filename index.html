<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.N MUSIC - Punjabi Hits</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <nav class="sidebar">
            <div class="logo">
                <div class="m-icon">M</div>
                <span>R.N MUSIC</span>
            </div>
            <ul>
                <li class="active"><i class="fa-solid fa-house"></i> Home</li>
                <li id="search-nav-btn"><i class="fa-solid fa-magnifying-glass"></i> Search</li>
                <li><i class="fa-solid fa-book-open"></i> Library</li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="Search Punjabi Songs...">
                </div>
            </header>

            <div class="playlist-section">
                <h1>Trending Punjabi</h1>
                <div id="song-list" class="song-list-container">
                    </div>
            </div>
        </main>

        <footer class="player-bar">
            <div class="current-track">
                <img id="track-img" src="" alt="" class="mini-cover">
                <div class="track-info">
                    <h4 id="song-title">Select Song</h4>
                    <p id="artist-name">R.N Studio</p>
                </div>
            </div>

            <div class="player-controls">
                <div class="buttons">
                    <i class="fa-solid fa-backward-step" onclick="prevSong()"></i>
                    <div class="play-pause" onclick="playPause()">
                        <i id="ctrlIcon" class="fa-solid fa-play"></i>
                    </div>
                    <i class="fa-solid fa-forward-step" onclick="nextSong()"></i>
                </div>
                <div class="progress-bar">
                    <span id="current-time">0:00</span>
                    <input type="range" id="progress" value="0">
                    <span id="total-duration">0:00</span>
                </div>
            </div>
            <div class="volume-controls">
                <i class="fa-solid fa-volume-high"></i>
                <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
